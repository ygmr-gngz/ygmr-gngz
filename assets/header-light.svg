<svg width="1200" height="420" viewBox="0 0 1200 420"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0"/>
    </radialGradient>

    <style>
      .pulse {
        animation: pulse 2.6s ease-in-out infinite alternate;
      }

      .pulse2 {
        animation: pulse 3.2s ease-in-out infinite alternate;
      }

      .line {
        stroke-dasharray: 10 12;
        animation: flow 8s linear infinite;
      }

      @keyframes pulse {
        from {
          opacity: 0.35;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes flow {
        from {
          stroke-dashoffset: 0;
        }

        to {
          stroke-dashoffset: -220;
        }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>

  <circle cx="975" cy="205" r="285" fill="url(#glow)"/>

  <g stroke="#0284C7"
     stroke-opacity="0.36"
     stroke-width="1.4"
     class="line">

    <line x1="760" y1="80" x2="855" y2="135"/>
    <line x1="855" y1="135" x2="960" y2="75"/>
    <line x1="855" y1="135" x2="920" y2="225"/>
    <line x1="920" y1="225" x2="1035" y2="165"/>
    <line x1="1035" y1="165" x2="1110" y2="250"/>
    <line x1="920" y1="225" x2="1000" y2="320"/>
    <line x1="760" y1="80" x2="790" y2="235"/>
    <line x1="790" y1="235" x2="920" y2="225"/>
    <line x1="790" y1="235" x2="840" y2="330"/>
    <line x1="840" y1="330" x2="1000" y2="320"/>
  </g>

  <g fill="#0369A1">
    <circle cx="760" cy="80" r="5" class="pulse"/>
    <circle cx="855" cy="135" r="7" class="pulse2"/>
    <circle cx="960" cy="75" r="5" class="pulse"/>
    <circle cx="920" cy="225" r="8" class="pulse2"/>
    <circle cx="1035" cy="165" r="6" class="pulse"/>
    <circle cx="1110" cy="250" r="5" class="pulse2"/>
    <circle cx="790" cy="235" r="6" class="pulse"/>
    <circle cx="840" cy="330" r="5" class="pulse2"/>
    <circle cx="1000" cy="320" r="7" class="pulse"/>
  </g>

  <text x="72"
        y="120"
        fill="#64748B"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        letter-spacing="4">
    HELLO, I AM
  </text>

  <text x="68"
        y="188"
        fill="#0F172A"
        font-family="Arial, Helvetica, sans-serif"
        font-size="58"
        font-weight="700">
    Yağmur Güngöz
  </text>

  <text x="72"
        y="239"
        fill="#0369A1"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24"
        font-weight="600">
    AI Engineer · LLM Systems · Computer Vision
  </text>

  <text x="72"
        y="291"
        fill="#475569"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19">
    Building intelligent systems from research to production.
  </text>

  <rect x="72"
        y="334"
        width="415"
        height="4"
        rx="2"
        fill="url(#accent)"/>

  <text x="72"
        y="375"
        fill="#64748B"
        font-family="monospace"
        font-size="16">
    Python · FastAPI · PyTorch · OpenAI · Next.js
  </text>
</svg>
