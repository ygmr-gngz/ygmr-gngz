  <title id="title">
    Yağmur Güngöz AI portfolio dashboard
  </title>

  <desc id="desc">
    Açık temalı, hareketli yapay zekâ geliştirici portföy paneli.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
