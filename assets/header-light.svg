    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8fc"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#008dad"/>
      <stop offset=".48" stop-color="#6248d8"/>
      <stop offset="1" stop-color="#d52f79"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0" stop-color="#20b8d5" stop-opacity=".13"/>
      <stop offset="1" stop-color="#20b8d5" stop-opacity="0"/>
    </radialGradient>

    <filter
      id="softGlow"
      x="-80%"
      y="-80%"
      width="260%"
      height="260%"
    >
      <feGaussianBlur stdDeviation="5" result="blur"/>

      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
