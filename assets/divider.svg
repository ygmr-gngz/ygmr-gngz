<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="54"
  viewBox="0 0 1200 54"
  role="img"
  aria-label="Animated section divider"
>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#24d3ee" stop-opacity="0"/>
      <stop offset=".22" stop-color="#24d3ee"/>
      <stop offset=".5" stop-color="#7c5cff"/>
      <stop offset=".78" stop-color="#ff4f9a"/>
      <stop offset="1" stop-color="#ff4f9a" stop-opacity="0"/>
    </linearGradient>

    <filter
      id="glow"
      x="-30%"
      y="-400%"
      width="160%"
      height="900%"
    >
      <feGaussianBlur stdDeviation="4" result="blur"/>

      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect
    x="80"
    y="26"
    width="1040"
    height="2"
    rx="1"
    fill="url(#line)"
    opacity=".55"
  />

  <rect
    x="80"
    y="25"
    width="150"
    height="4"
    rx="2"
    fill="url(#line)"
    filter="url(#glow)"
  >
    <animate
      attributeName="x"
      values="80;970;80"
      dur="7s"
      repeatCount="indefinite"
    />
  </rect>

  <circle
    cx="600"
    cy="27"
    r="4"
    fill="#ffffff"
    filter="url(#glow)"
  >
    <animate
      attributeName="opacity"
      values=".35;1;.35"
      dur="2s"
      repeatCount="indefinite"
    />
  </circle>
</svg>
