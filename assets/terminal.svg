<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="390"
  viewBox="0 0 1200 390"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">
    Yağmur Güngöz developer terminal
  </title>

  <desc id="desc">
    Animasyonlu, koyu temalı geliştirici terminali.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a11"/>
      <stop offset="1" stop-color="#0d1624"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#24d3ee"/>
      <stop offset=".5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#ff4f9a"/>
    </linearGradient>

    <filter
      id="glow"
      x="-80%"
      y="-80%"
      width="260%"
      height="260%"
    >
      <feGaussianBlur stdDeviation="4" result="blur"/>

      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      text {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .prompt {
        fill: #68f2cb;
        font-size: 16px;
      }

      .command {
        fill: #edf4ff;
        font-size: 16px;
      }

      .result {
        fill: #8fa4bf;
        font-size: 15px;
      }

      .strong {
        fill: #7de7f4;
        font-size: 15px;
      }
    </style>
  </defs>

  <rect
    width="1200"
    height="390"
    rx="24"
    fill="url(#bg)"
  />

  <rect
    x="1"
    y="1"
    width="1198"
    height="388"
    rx="23"
    fill="none"
    stroke="#2a3950"
  />

  <rect
    x="0"
    y="0"
    width="1200"
    height="6"
    rx="3"
    fill="url(#accent)"
  />

  <rect
    x="28"
    y="24"
    width="1144"
    height="48"
    rx="14"
    fill="#0c1320"
    stroke="#26364e"
  />

  <circle cx="56" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="77" cy="48" r="6" fill="#febc2e"/>
  <circle cx="98" cy="48" r="6" fill="#28c840"/>

  <text
    x="128"
    y="54"
    fill="#7890ad"
    font-size="13"
  >
    ygmr-gngz — ai-product-shell
  </text>

  <text
    x="1139"
    y="54"
    text-anchor="end"
    fill="#6a7f99"
    font-size="12"
  >
    UTF-8
  </text>

  <text x="54" y="112" class="prompt">
    yağmur@portfolio:~$
  </text>

  <text x="255" y="112" class="command">
    whoami
  </text>

  <g opacity="0">
    <text x="54" y="145" class="strong">
      AI Engineer building LLM, RAG, agent and vision systems.
    </text>

    <animate
      attributeName="opacity"
      values="0;0;1;1"
      keyTimes="0;.16;.22;1"
      dur="10s"
      repeatCount="indefinite"
    />
  </g>

  <g opacity="0">
    <text x="54" y="190" class="prompt">
      yağmur@portfolio:~$
    </text>

    <text x="255" y="190" class="command">
      current_focus --verbose
    </text>

    <animate
      attributeName="opacity"
      values="0;0;1;1"
      keyTimes="0;.30;.36;1"
      dur="10s"
      repeatCount="indefinite"
    />
  </g>

  <g opacity="0">
    <text x="72" y="226" class="result">
      → Multi-agent AI product architecture
    </text>

    <text x="72" y="253" class="result">
      → Retrieval-Augmented Generation and evaluation
    </text>

    <text x="72" y="280" class="result">
      → Computer Vision for real-world safety scenarios
    </text>

    <text x="72" y="307" class="result">
      → From research prototype to production deployment
    </text>

    <animate
      attributeName="opacity"
      values="0;0;1;1"
      keyTimes="0;.45;.52;1"
      dur="10s"
      repeatCount="indefinite"
    />
  </g>

  <g opacity="0">
    <text x="54" y="351" class="prompt">
      yağmur@portfolio:~$
    </text>

    <text x="255" y="351" class="command">
      system_status
    </text>

    <text
      x="398"
      y="351"
      fill="#69f0c8"
      font-size="15"
    >
      READY
    </text>

    <rect
      x="463"
      y="336"
      width="10"
      height="20"
      rx="2"
      fill="#7de7f4"
      filter="url(#glow)"
    >
      <animate
        attributeName="opacity"
        values="1;0;1"
        dur=".9s"
        repeatCount="indefinite"
      />
    </rect>

    <animate
      attributeName="opacity"
      values="0;0;1;1"
      keyTimes="0;.68;.74;1"
      dur="10s"
      repeatCount="indefinite"
    />
  </g>
</svg>
