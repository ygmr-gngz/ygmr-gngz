name: Update profile statistics

on:
  workflow_dispatch:

  schedule:
    - cron: "17 4 * * *"

  push:
    branches:
      - main

    paths:
      - "scripts/generate_stats.py"
      - ".github/workflows/main.yml"

permissions:
  contents: write

concurrency:
  group: profile-statistics
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Generate local statistics SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ygmr-gngz

        run: python scripts/generate_stats.py

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- assets/stats.svg; then
            echo "Statistics are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/stats.svg
          git commit -m "chore: update profile statistics"
          git push
